name: Direct YouTube Download (Large Files)

on:
  repository_dispatch:
    types: [direct_download_large]
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube URL'
        required: true
      quality:
        description: 'Quality'
        required: false
        default: '720'

jobs:
  download-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install yt-dlp, FFmpeg, Deno, and build tools
      run: |
        sudo apt update
        sudo apt install -y ffmpeg unzip git make g++ libssl-dev zlib1g-dev cmake
        pip install yt-dlp
        curl -fsSL https://deno.land/install.sh | sh
        echo "$HOME/.deno/bin" >> $GITHUB_PATH

    # ----- Download Telegram Bot API binary (specific version) -----
    - name: Download Telegram Bot API binary (v7.10.0)
      id: download_binary
      run: |
        VERSION="v7.10.0"
        URL="https://github.com/tdlib/telegram-bot-api/releases/download/${VERSION}/telegram-bot-api-linux-amd64"
        echo "Downloading from: $URL"
        curl -L -o telegram-bot-api "$URL"
        if file telegram-bot-api | grep -q "ELF 64-bit LSB executable"; then
          chmod +x telegram-bot-api
          echo "Binary download successful."
          echo "binary_ok=true" >> $GITHUB_OUTPUT
        else
          echo "Binary download failed (not an ELF file). Falling back to source build."
          echo "binary_ok=false" >> $GITHUB_OUTPUT
          # Remove the invalid file so it doesn't interfere with git clone
          rm -f telegram-bot-api
        fi

    # ----- Fallback: Build from source if binary failed -----
    - name: Build Telegram Bot API from source (fallback)
      if: steps.download_binary.outputs.binary_ok != 'true'
      run: |
        # Clone to a new directory to avoid conflict with existing file/dir
        git clone --recursive https://github.com/tdlib/telegram-bot-api.git telegram-bot-api-src
        cd telegram-bot-api-src
        mkdir build && cd build
        cmake -DCMAKE_BUILD_TYPE=Release ..
        make -j$(nproc)
        sudo cp telegram-bot-api /usr/local/bin/
        # Verify it's installed
        which telegram-bot-api || echo "Installation failed"
        echo "BINARY_PATH=/usr/local/bin/telegram-bot-api" >> $GITHUB_ENV

    - name: Set binary path (for binary download)
      if: steps.download_binary.outputs.binary_ok == 'true'
      run: echo "BINARY_PATH=./telegram-bot-api" >> $GITHUB_ENV

    - name: Start Local Bot API
      run: |
        pkill -f telegram-bot-api || true
        mkdir -p ./bot_data
        nohup $BINARY_PATH \
          --api-id=32919068 \
          --api-hash="824126c0da44d9c3843ff18ba777e175" \
          --local \
          --http-port=8081 \
          --dir=./bot_data \
          > ./bot_data/bot.log 2>&1 &
        for i in {1..15}; do
          if curl -s http://localhost:8081/ping > /dev/null 2>&1; then
            echo "Local Bot API started."
            break
          fi
          echo "Waiting... ($i)"
          sleep 1
        done
        if ! curl -s http://localhost:8081/ping > /dev/null 2>&1; then
          echo "ERROR: Local Bot API failed to start. Log:"
          cat ./bot_data/bot.log
          exit 1
        fi

    - name: Get video title
      id: title
      run: |
        URL="${{ github.event.client_payload.url }}"
        RAW_TITLE=$(yt-dlp --get-title "$URL" --cookies cookies.txt --js-runtimes deno --remote-components ejs:github 2>/dev/null || echo "YouTube_Video")
        SAFE_TITLE=$(echo "$RAW_TITLE" | sed 's/[^a-zA-Z0-9\-]/_/g' | sed 's/__*/_/g' | cut -c1-100)
        echo "raw_title=${RAW_TITLE}" >> $GITHUB_OUTPUT
        echo "safe_title=${SAFE_TITLE}" >> $GITHUB_OUTPUT

    - name: Download video
      id: download
      run: |
        URL="${{ github.event.client_payload.url }}"
        QUALITY="${{ github.event.client_payload.quality || '720' }}"
        SAFE_TITLE="${{ steps.title.outputs.safe_title }}"
        
        case "$QUALITY" in
          "144")  F="-f bestvideo[height<=144]+bestaudio/best[height<=144]" ;;
          "240")  F="-f bestvideo[height<=240]+bestaudio/best[height<=240]" ;;
          "360")  F="-f bestvideo[height<=360]+bestaudio/best[height<=360]" ;;
          "480")  F="-f bestvideo[height<=480]+bestaudio/best[height<=480]" ;;
          "720")  F="-f bestvideo[height<=720]+bestaudio/best[height<=720]" ;;
          "1080") F="-f bestvideo[height<=1080]+bestaudio/best[height<=1080]" ;;
          "best") F="--merge-output-format mp4" ;;
          "audio") F="-x --audio-format mp3" ;;
          *)      F="-f bestvideo[height<=720]+bestaudio/best[height<=720]" ;;
        esac
        
        yt-dlp $F \
          --merge-output-format mp4 \
          --cookies cookies.txt \
          --js-runtimes deno \
          --remote-components ejs:github \
          -o "${SAFE_TITLE}.%(ext)s" "$URL"
        
        if [ "$QUALITY" = "audio" ]; then
          EXT="mp3"
        else
          EXT="mp4"
        fi
        FINAL_NAME="${SAFE_TITLE}.${EXT}"
        echo "video_file=${FINAL_NAME}" >> $GITHUB_OUTPUT

    - name: Send to Telegram
      env:
        BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        CHAT_ID: ${{ github.event.client_payload.chat_id }}
        PROGRESS_MSG_ID: ${{ github.event.client_payload.progress_msg_id }}
        TITLE: ${{ steps.title.outputs.raw_title }}
        GROUP_CHAT_ID: ${{ github.event.client_payload.group_chat_id || '' }}
        THUMB_MSG_ID: ${{ github.event.client_payload.thumbnail_msg_id || '' }}
      run: |
        FILE="${{ steps.download.outputs.video_file }}"
        EXT="${FILE##*.}"
        API_URL="http://localhost:8081/bot${BOT_TOKEN}"

        echo "Sending file: $FILE"
        if [ "$EXT" = "mp4" ]; then
          RESP=$(curl -s -X POST "${API_URL}/sendVideo" \
            -F chat_id="$CHAT_ID" \
            -F video=@"$FILE" \
            -F caption="🎬 *${TITLE}*" \
            -F parse_mode="Markdown")
        else
          RESP=$(curl -s -X POST "${API_URL}/sendDocument" \
            -F chat_id="$CHAT_ID" \
            -F document=@"$FILE" \
            -F caption="🎵 *${TITLE}*" \
            -F parse_mode="Markdown")
        fi

        MSG_ID=$(echo "$RESP" | jq -r '.result.message_id')
        if [ -z "$MSG_ID" ] || [ "$MSG_ID" = "null" ]; then
          echo "ERROR: Failed to send file. Response: $RESP"
          exit 1
        fi

        if [ -n "$GROUP_CHAT_ID" ] && [ "$GROUP_CHAT_ID" != "null" ]; then
          if [ -n "$THUMB_MSG_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/forwardMessage" \
              -d chat_id="$GROUP_CHAT_ID" \
              -d from_chat_id="$CHAT_ID" \
              -d message_id="$THUMB_MSG_ID"
          fi
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/forwardMessage" \
            -d chat_id="$GROUP_CHAT_ID" \
            -d from_chat_id="$CHAT_ID" \
            -d message_id="$MSG_ID"
        fi

        curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/deleteMessage" \
          -d chat_id="$CHAT_ID" \
          -d message_id="$PROGRESS_MSG_ID"
