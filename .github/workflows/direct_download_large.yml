name: Direct YouTube Download (Large Files)

on:
  repository_dispatch:
    types: [direct_download_large]
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube URL'
        required: true
      quality:
        description: 'Quality'
        required: false
        default: '720'

jobs:
  download-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - name: Setup & download
      id: dl
      env:
        BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
      run: |
        set -e
        WORKER_URL="https://bitter-wind-2755.ame315898036.workers.dev/progress"
        report() {
          if [ -n "$CHAT_ID" ] && [ -n "$PROGRESS_MSG_ID" ]; then
            curl -s -X POST "$WORKER_URL" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\":\"$CHAT_ID\",\"message_id\":\"$PROGRESS_MSG_ID\",\"progress\":\"$1\",\"status\":\"$2\",\"file_size\":\"${3:-}\",\"quality\":\"${4:-}\"}" > /dev/null 2>&1 || true
          fi
        }

        # --- Resolve inputs ---
        URL="${{ github.event.client_payload.url || inputs.url }}"
        QUALITY="${{ github.event.client_payload.quality || inputs.quality || '720' }}"
        CHAT_ID="${{ github.event.client_payload.chat_id || '102332059' }}"
        PROGRESS_MSG_ID="${{ github.event.client_payload.progress_msg_id || '' }}"
        THUMB_MSG_ID="${{ github.event.client_payload.thumbnail_msg_id || '' }}"
        GROUP_CHAT_ID="${{ github.event.client_payload.group_chat_id || '' }}"

        # --- Download tools + cookies ---
        curl -sL "https://github.com/${{ github.repository }}/releases/download/tools-v1/tools.tar.gz" | sudo tar xz -C /usr/local/bin
        curl -sL "https://raw.githubusercontent.com/${{ github.repository }}/main/cookies.txt" -o cookies.txt

        # --- Start Telegram Bot API (pull+start in parallel with tool download above) ---
        docker run -d --name telegram-bot-api -p 8081:8081 \
          -e TELEGRAM_API_ID=32919068 \
          -e TELEGRAM_API_HASH="$TELEGRAM_API_HASH" \
          -e TELEGRAM_BOT_TOKEN="$BOT_TOKEN" \
          aiogram/telegram-bot-api:latest &
        DOCKER_PID=$!

        # Poll faster (0.5s intervals instead of 2s)
        for i in $(seq 1 40); do
          if curl -s http://localhost:8081/ping > /dev/null 2>&1; then
            echo "Telegram Bot API ready."
            break
          fi
          sleep 0.5
        done
        if ! curl -s http://localhost:8081/ping > /dev/null 2>&1; then
          echo "ERROR: Telegram Bot API failed to start."
          docker logs telegram-bot-api
          exit 1
        fi

        report 10 "downloading"

        # --- Download video (title + video in one yt-dlp call) ---
        mkdir -p /tmp/yt && cd /tmp/yt

        case "$QUALITY" in
          "144")  F="-f bestvideo[height<=144]+bestaudio/best[height<=144]" ;;
          "240")  F="-f bestvideo[height<=240]+bestaudio/best[height<=240]" ;;
          "360")  F="-f bestvideo[height<=360]+bestaudio/best[height<=360]" ;;
          "480")  F="-f bestvideo[height<=480]+bestaudio/best[height<=480]" ;;
          "720")  F="-f bestvideo[height<=720]+bestaudio/best[height<=720]" ;;
          "1080") F="-f bestvideo[height<=1080]+bestaudio/best[height<=1080]" ;;
          "best") F="--merge-output-format mp4" ;;
          "audio") F="-x --audio-format mp3" ;;
          *)      F="-f bestvideo[height<=720]+bestaudio/best[height<=720]" ;;
        esac

        # Use output template to avoid needing separate title fetch
        yt-dlp $F \
          --merge-output-format mp4 \
          --write-thumbnail --convert-thumbnails jpg \
          --cookies cookies.txt \
          --js-runtimes deno \
          -o "video.%(ext)s" "$URL"

        report 60 "downloading"

        # --- Process output ---
        if [ "$QUALITY" = "audio" ]; then
          FINAL_NAME="video.mp3"
          FILE_SIZE=$(du -h "$FINAL_NAME" | cut -f1 | sed 's/M$/MB/' | sed 's/G$/GB/')
          DURATION=0; WIDTH=0; HEIGHT=0; THUMB_FILE=""
        else
          ffmpeg -i "video.mp4" -c copy -movflags +faststart "video_stream.mp4"
          FINAL_NAME="video_stream.mp4"
          FILE_SIZE=$(du -h "$FINAL_NAME" | cut -f1)
          DURATION=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "$FINAL_NAME" 2>/dev/null | cut -d. -f1)
          WIDTH=$(ffprobe -v error -select_streams v:0 -show_entries stream=width -of csv=s=x:p=0 "$FINAL_NAME" 2>/dev/null)
          HEIGHT=$(ffprobe -v error -select_streams v:0 -show_entries stream=height -of csv=s=x:p=0 "$FINAL_NAME" 2>/dev/null)
          THUMB_FILE=""
          for f in video.jpg video.webp video.thumb.jpg; do
            [ -f "$f" ] && THUMB_FILE="$f" && break
          done
        fi

        report 90 "downloading"

        # --- Send to Telegram ---
        API_URL="http://localhost:8081/bot${BOT_TOKEN}"
        MSG_ID=""

        for i in 1 2 3; do
          if [ "$QUALITY" = "audio" ]; then
            RESP=$(curl -s -X POST "${API_URL}/sendDocument" \
              -F chat_id="$CHAT_ID" -F document=@"$FINAL_NAME" -F caption="🎵 ${URL}")
          else
            THUMB_ARGS=""
            [ -n "$THUMB_FILE" ] && [ -f "$THUMB_FILE" ] && THUMB_ARGS="-F thumb=@${THUMB_FILE}"
            RESP=$(curl -s -X POST "${API_URL}/sendVideo" \
              -F chat_id="$CHAT_ID" -F video=@"$FINAL_NAME" $THUMB_ARGS \
              -F duration="$DURATION" -F width="$WIDTH" -F height="$HEIGHT" \
              -F supports_streaming=true -F caption="🎬 ${URL}")
          fi
          MSG_ID=$(echo "$RESP" | jq -r '.result.message_id')
          if [ -n "$MSG_ID" ] && [ "$MSG_ID" != "null" ]; then break; fi
          ERROR=$(echo "$RESP" | jq -r '.description')
          if echo "$ERROR" | grep -q "Too Many Requests"; then
            RETRY_AFTER=$(echo "$RESP" | jq -r '.parameters.retry_after // 10')
            sleep $((RETRY_AFTER + 2))
          else
            echo "ERROR: $RESP"
            report 0 "error"
            exit 1
          fi
        done

        [ -z "$MSG_ID" ] || [ "$MSG_ID" = "null" ] && { report 0 "error"; exit 1; }

        DISPLAY_QUALITY="${QUALITY}p"
        [ "$QUALITY" = "best" ] && [ -n "$HEIGHT" ] && [ "$HEIGHT" != "0" ] && DISPLAY_QUALITY="${HEIGHT}p"
        report 100 "done" "$FILE_SIZE" "$DISPLAY_QUALITY"

        # Forward to group if provided
        if [ -n "$GROUP_CHAT_ID" ] && [ "$GROUP_CHAT_ID" != "null" ]; then
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/forwardMessage" \
            -d chat_id="$GROUP_CHAT_ID" -d from_chat_id="$CHAT_ID" -d message_id="$PROGRESS_MSG_ID" &
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/forwardMessage" \
            -d chat_id="$GROUP_CHAT_ID" -d from_chat_id="$CHAT_ID" -d message_id="$MSG_ID" &
        fi

        echo "Done! Message ID: $MSG_ID"
