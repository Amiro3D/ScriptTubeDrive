name: Direct YouTube Download (Large Files)

on:
  repository_dispatch:
    types: [direct_download_large]
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube URL'
        required: true
      quality:
        description: 'Quality'
        required: false
        default: '720'

jobs:
  download-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 15   # allow extra time for compilation

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # ---------- Install dependencies ----------
    - name: Install yt-dlp and FFmpeg
      run: |
        sudo apt update
        sudo apt install -y ffmpeg
        pip install yt-dlp

    # ---------- Build Local Bot API from source ----------
    - name: Build Telegram Local Bot API
      run: |
        sudo apt update
        sudo apt install -y git make g++ libssl-dev zlib1g-dev cmake
        git clone --recursive https://github.com/tdlib/telegram-bot-api.git
        cd telegram-bot-api
        mkdir build && cd build
        cmake -DCMAKE_BUILD_TYPE=Release ..
        make -j$(nproc)
        sudo cp telegram-bot-api /usr/local/bin/

    # ---------- Start the Local Bot API in background ----------
    - name: Start Local Bot API
      run: |
        # Replace with your own api_id and api_hash if needed
        telegram-bot-api \
          --api-id=32919068 \
          --api-hash="824126c0da44d9c3843ff18ba777e175" \
          --local \
          --http-port=8081 &
        sleep 5

    # ---------- Get video title ----------
    - name: Get video title
      id: title
      run: |
        URL="${{ github.event.client_payload.url }}"
        RAW_TITLE=$(yt-dlp --get-title "$URL" 2>/dev/null || echo "YouTube_Video")
        SAFE_TITLE=$(echo "$RAW_TITLE" | sed 's/[^a-zA-Z0-9\-]/_/g' | sed 's/__*/_/g' | cut -c1-100)
        echo "raw_title=${RAW_TITLE}" >> $GITHUB_OUTPUT
        echo "safe_title=${SAFE_TITLE}" >> $GITHUB_OUTPUT

    # ---------- Download video ----------
    - name: Download video
      id: download
      run: |
        URL="${{ github.event.client_payload.url }}"
        QUALITY="${{ github.event.client_payload.quality || '720' }}"
        SAFE_TITLE="${{ steps.title.outputs.safe_title }}"
        
        case "$QUALITY" in
          "144")  F="-f bestvideo[height<=144]+bestaudio/best[height<=144]" ;;
          "240")  F="-f bestvideo[height<=240]+bestaudio/best[height<=240]" ;;
          "360")  F="-f bestvideo[height<=360]+bestaudio/best[height<=360]" ;;
          "480")  F="-f bestvideo[height<=480]+bestaudio/best[height<=480]" ;;
          "720")  F="-f bestvideo[height<=720]+bestaudio/best[height<=720]" ;;
          "1080") F="-f bestvideo[height<=1080]+bestaudio/best[height<=1080]" ;;
          "best") F="--merge-output-format mp4" ;;
          "audio") F="-x --audio-format mp3" ;;
          *)      F="-f bestvideo[height<=720]+bestaudio/best[height<=720]" ;;
        esac
        
        yt-dlp $F --merge-output-format mp4 -o "${SAFE_TITLE}.%(ext)s" "$URL"
        
        if [ "$QUALITY" = "audio" ]; then
          EXT="mp3"
        else
          EXT="mp4"
        fi
        FINAL_NAME="${SAFE_TITLE}.${EXT}"
        echo "video_file=${FINAL_NAME}" >> $GITHUB_OUTPUT

    # ---------- Send to Telegram via Local Bot API ----------
    - name: Send to Telegram
      env:
        BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        CHAT_ID: ${{ github.event.client_payload.chat_id }}
        PROGRESS_MSG_ID: ${{ github.event.client_payload.progress_msg_id }}
        TITLE: ${{ steps.title.outputs.raw_title }}
        GROUP_CHAT_ID: ${{ github.event.client_payload.group_chat_id || '' }}
        THUMB_MSG_ID: ${{ github.event.client_payload.thumbnail_msg_id || '' }}
      run: |
        FILE="${{ steps.download.outputs.video_file }}"
        EXT="${FILE##*.}"
        API_URL="http://localhost:8081/bot${BOT_TOKEN}"

        # 1. Send the video/audio to the user
        if [ "$EXT" = "mp4" ]; then
          RESP=$(curl -s -X POST "${API_URL}/sendVideo" \
            -F chat_id="$CHAT_ID" \
            -F video=@"$FILE" \
            -F caption="🎬 *${TITLE}*" \
            -F parse_mode="Markdown")
        else
          RESP=$(curl -s -X POST "${API_URL}/sendDocument" \
            -F chat_id="$CHAT_ID" \
            -F document=@"$FILE" \
            -F caption="🎵 *${TITLE}*" \
            -F parse_mode="Markdown")
        fi

        # Extract the message ID of the sent file
        MSG_ID=$(echo "$RESP" | jq -r '.result.message_id')
        echo "Sent file, message ID: $MSG_ID"

        # 2. Forward to the group if GROUP_CHAT_ID is provided
        if [ -n "$GROUP_CHAT_ID" ] && [ "$GROUP_CHAT_ID" != "null" ]; then
          # Forward thumbnail (if we have its ID)
          if [ -n "$THUMB_MSG_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/forwardMessage" \
              -d chat_id="$GROUP_CHAT_ID" \
              -d from_chat_id="$CHAT_ID" \
              -d message_id="$THUMB_MSG_ID"
          fi
          # Forward the video/document
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/forwardMessage" \
            -d chat_id="$GROUP_CHAT_ID" \
            -d from_chat_id="$CHAT_ID" \
            -d message_id="$MSG_ID"
        fi

        # 3. Delete the progress message (sent by the worker)
        curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/deleteMessage" \
          -d chat_id="$CHAT_ID" \
          -d message_id="$PROGRESS_MSG_ID"
