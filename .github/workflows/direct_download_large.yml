name: Direct YouTube Download (Large Files)

on:
  repository_dispatch:
    types: [direct_download_large]
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube URL'
        required: true
      quality:
        description: 'Quality'
        required: false
        default: '720'

jobs:
  download-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # ---------- Cache pip and Deno (fast) ----------
    - name: Cache pip packages
      uses: actions/cache@v4
      id: pip-cache
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-ytdlp-v2
        restore-keys: |
          ${{ runner.os }}-pip-ytdlp-

    - name: Cache Deno
      uses: actions/cache@v4
      id: deno-cache
      with:
        path: ~/.deno
        key: ${{ runner.os }}-deno-v1
        restore-keys: |
          ${{ runner.os }}-deno-

    # ---------- Install yt-dlp and Deno ----------
    - name: Install yt-dlp and Deno
      run: |
        pip install yt-dlp
        if [ ! -f "$HOME/.deno/bin/deno" ]; then
          echo "Deno not in cache, installing..."
          curl -fsSL https://deno.land/install.sh | sh
        else
          echo "Deno found in cache, skipping install."
        fi
        echo "$HOME/.deno/bin" >> $GITHUB_PATH

    # ---------- Install FFmpeg only if missing ----------
    - name: Install FFmpeg (if not present)
      run: |
        if command -v ffmpeg &> /dev/null; then
          echo "FFmpeg is already installed, skipping."
        else
          sudo apt update
          sudo apt install -y --no-install-recommends ffmpeg
        fi

    # ---------- Run Telegram Bot API via Docker ----------
    - name: Run Telegram Bot API via Docker
      run: |
        docker run -d \
          --name telegram-bot-api \
          -p 8081:8081 \
          -e TELEGRAM_API_ID=32919068 \
          -e TELEGRAM_API_HASH="824126c0da44d9c3843ff18ba777e175" \
          -e TELEGRAM_BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}" \
          aiogram/telegram-bot-api:latest
        for i in {1..10}; do
          if curl -s http://localhost:8081/ping > /dev/null 2>&1; then
            echo "Telegram Bot API started."
            break
          fi
          echo "Waiting... ($i)"
          sleep 2
        done
        if ! curl -s http://localhost:8081/ping > /dev/null 2>&1; then
          echo "ERROR: Failed to start Telegram Bot API via Docker."
          docker logs telegram-bot-api
          exit 1
        fi

    # ---------- Get video title ----------
    - name: Get video title
      id: title
      run: |
        URL="${{ github.event.client_payload.url }}"
        RAW_TITLE=$(yt-dlp --get-title "$URL" --cookies cookies.txt --js-runtimes deno --remote-components ejs:github 2>/dev/null || echo "YouTube_Video")
        SAFE_TITLE=$(echo "$RAW_TITLE" | sed 's/[^a-zA-Z0-9\-]/_/g' | sed 's/__*/_/g' | cut -c1-100)
        echo "raw_title=${RAW_TITLE}" >> $GITHUB_OUTPUT
        echo "safe_title=${SAFE_TITLE}" >> $GITHUB_OUTPUT

    # ---------- Download video ----------
    - name: Download video
      id: download
      run: |
        URL="${{ github.event.client_payload.url }}"
        QUALITY="${{ github.event.client_payload.quality || '720' }}"
        SAFE_TITLE="${{ steps.title.outputs.safe_title }}"
        
        case "$QUALITY" in
          "144")  F="-f bestvideo[height<=144]+bestaudio/best[height<=144]" ;;
          "240")  F="-f bestvideo[height<=240]+bestaudio/best[height<=240]" ;;
          "360")  F="-f bestvideo[height<=360]+bestaudio/best[height<=360]" ;;
          "480")  F="-f bestvideo[height<=480]+bestaudio/best[height<=480]" ;;
          "720")  F="-f bestvideo[height<=720]+bestaudio/best[height<=720]" ;;
          "1080") F="-f bestvideo[height<=1080]+bestaudio/best[height<=1080]" ;;
          "best") F="--merge-output-format mp4" ;;
          "audio") F="-x --audio-format mp3" ;;
          *)      F="-f bestvideo[height<=720]+bestaudio/best[height<=720]" ;;
        esac
        
        yt-dlp $F \
          --merge-output-format mp4 \
          --cookies cookies.txt \
          --js-runtimes deno \
          --remote-components ejs:github \
          -o "${SAFE_TITLE}.%(ext)s" "$URL"
        
        if [ "$QUALITY" = "audio" ]; then
          EXT="mp3"
        else
          EXT="mp4"
        fi
        FINAL_NAME="${SAFE_TITLE}.${EXT}"
        echo "video_file=${FINAL_NAME}" >> $GITHUB_OUTPUT

    # ---------- Send to Telegram ----------
    - name: Send to Telegram
      env:
        BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        CHAT_ID: ${{ github.event.client_payload.chat_id }}
        PROGRESS_MSG_ID: ${{ github.event.client_payload.progress_msg_id }}
        TITLE: ${{ steps.title.outputs.raw_title }}
        GROUP_CHAT_ID: ${{ github.event.client_payload.group_chat_id || '' }}
        THUMB_MSG_ID: ${{ github.event.client_payload.thumbnail_msg_id || '' }}
      run: |
        FILE="${{ steps.download.outputs.video_file }}"
        EXT="${FILE##*.}"
        API_URL="http://localhost:8081/bot${BOT_TOKEN}"

        echo "Sending file: $FILE"

        if [ "$EXT" = "mp4" ]; then
          RESP=$(curl -s -X POST "${API_URL}/sendVideo" \
            -F chat_id="$CHAT_ID" \
            -F video=@"$FILE" \
            -F caption="🎬 *${TITLE}*" \
            -F parse_mode="Markdown")
        else
          RESP=$(curl -s -X POST "${API_URL}/sendDocument" \
            -F chat_id="$CHAT_ID" \
            -F document=@"$FILE" \
            -F caption="🎵 *${TITLE}*" \
            -F parse_mode="Markdown")
        fi

        MSG_ID=$(echo "$RESP" | jq -r '.result.message_id')
        echo "Response: $RESP"
        if [ -z "$MSG_ID" ] || [ "$MSG_ID" = "null" ]; then
          echo "ERROR: Failed to send file. Response: $RESP"
          exit 1
        fi

        echo "Sent file, message ID: $MSG_ID"

        if [ -n "$GROUP_CHAT_ID" ] && [ "$GROUP_CHAT_ID" != "null" ]; then
          if [ -n "$THUMB_MSG_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/forwardMessage" \
              -d chat_id="$GROUP_CHAT_ID" \
              -d from_chat_id="$CHAT_ID" \
              -d message_id="$THUMB_MSG_ID"
          fi
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/forwardMessage" \
            -d chat_id="$GROUP_CHAT_ID" \
            -d from_chat_id="$CHAT_ID" \
            -d message_id="$MSG_ID"
        fi

        curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/deleteMessage" \
          -d chat_id="$CHAT_ID" \
          -d message_id="$PROGRESS_MSG_ID"
