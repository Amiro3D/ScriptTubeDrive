name: YouTube Downloader API

on:
  repository_dispatch:
    types: [download]
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube URL'
        required: true

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup yt-dlp
      uses: AnimMouse/setup-yt-dlp@v3

    - name: Check cookies
      run: |
        if [ ! -f cookies.txt ]; then
          echo "cookies.txt not found! Please add it to the repository."
          exit 1
        fi

    - name: Get video title and sanitize it
      id: title
      run: |
        URL="${{ github.event.client_payload.url || github.event.inputs.url }}"
        RAW_TITLE=$(yt-dlp --get-title "$URL" --cookies cookies.txt 2>/dev/null || echo "YouTube_Video")
        SAFE_TITLE=$(echo "$RAW_TITLE" | sed 's/[^a-zA-Z0-9\-]/_/g' | sed 's/__*/_/g' | sed 's/^_//' | sed 's/_$//' | cut -c1-100)
        if [ -z "$SAFE_TITLE" ]; then
          SAFE_TITLE="video_$(date +%Y%m%d_%H%M%S)"
        fi
        echo "raw_title=${RAW_TITLE}" >> $GITHUB_OUTPUT
        echo "safe_title=${SAFE_TITLE}" >> $GITHUB_OUTPUT
        echo "request_id=${{ github.event.client_payload.request_id }}" >> $GITHUB_OUTPUT

    - name: Download video
      id: download
      run: |
        URL="${{ github.event.client_payload.url || github.event.inputs.url }}"
        SAFE_TITLE="${{ steps.title.outputs.safe_title }}"
        yt-dlp -f "best[height<=720]" --merge-output-format mp4 --cookies cookies.txt \
          --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
          -o "${SAFE_TITLE}.mp4" "$URL"
        echo "video_file=${SAFE_TITLE}.mp4" >> $GITHUB_OUTPUT

    - name: Glob to Drive - Upload to Google Drive
      uses: adityak74/google-drive-upload-git-action@main
      with:
        credentials: ${{ secrets.OAUTH_CREDENTIALS }}   # Your OAuth2 credentials JSON as a secret
        refreshToken: ${{ secrets.REFRESH_TOKEN }}      # Your refresh token
        filename: ${{ steps.download.outputs.video_file }}
        folderId: 1BL1p3Q-6OL50GzVbC0K_n7XwF7gAuU3Z    # Your Google Drive folder ID
