name: YouTube Downloader API

on:
  repository_dispatch:
    types: [download]
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube URL'
        required: true
        default: 'https://www.youtube.com/watch?v=dQw4w9WgXcQ'

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to create releases
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup yt-dlp
      uses: AnimMouse/setup-yt-dlp@v3
    
    - name: Download video
      run: |
        URL="${{ github.event.client_payload.url || github.event.inputs.url }}"
        
        if [ -f "cookies.txt" ]; then
          yt-dlp "$URL" \
            -f "best[height<=720]" \
            --merge-output-format mp4 \
            --cookies cookies.txt \
            -o "video.mp4"
        else
          yt-dlp "$URL" \
            -f "best[height<=720]" \
            --merge-output-format mp4 \
            -o "video.mp4"
        fi
    
    - name: Get video title
      id: title
      run: |
        if [ -f "cookies.txt" ]; then
          TITLE=$(yt-dlp --get-title "${{ github.event.client_payload.url || github.event.inputs.url }}" --cookies cookies.txt 2>/dev/null || echo "YouTube Video")
        else
          TITLE=$(yt-dlp --get-title "${{ github.event.client_payload.url || github.event.inputs.url }}" 2>/dev/null || echo "YouTube Video")
        fi
        echo "name=${TITLE}" >> $GITHUB_OUTPUT
    
    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        name: "Video: ${{ steps.title.outputs.name }}"
        tag_name: "video-${{ github.run_id }}"
        files: video.mp4
        generate_release_notes: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
