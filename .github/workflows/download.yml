name: YouTube Downloader API

on:
  repository_dispatch:
    types: [download]
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube URL'
        required: true

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup yt-dlp
      uses: AnimMouse/setup-yt-dlp@v3

    - name: Get video title and sanitize it
      id: title
      run: |
        URL="${{ github.event.client_payload.url || github.event.inputs.url }}"
        
        RAW_TITLE=$(yt-dlp --get-title "$URL" --cookies cookies.txt 2>/dev/null || echo "YouTube_Video")
        SAFE_TITLE=$(echo "$RAW_TITLE" | sed 's/[^a-zA-Z0-9\-]/_/g' | sed 's/__*/_/g' | sed 's/^_//' | sed 's/_$//' | cut -c1-100)
        
        if [ -z "$SAFE_TITLE" ]; then
          SAFE_TITLE="video_$(date +%Y%m%d_%H%M%S)"
        fi
        
        echo "raw_title=${RAW_TITLE}" >> $GITHUB_OUTPUT
        echo "safe_title=${SAFE_TITLE}" >> $GITHUB_OUTPUT
        echo "request_id=${{ github.event.client_payload.request_id }}" >> $GITHUB_OUTPUT

    - name: Install zip
      run: sudo apt-get install -y zip

    - name: Download video
      id: download
      run: |
        URL="${{ github.event.client_payload.url || github.event.inputs.url }}"
        SAFE_TITLE="${{ steps.title.outputs.safe_title }}"
        
        yt-dlp "$URL" \
          -f "best[height<=720]" \
          --merge-output-format mp4 \
          --cookies cookies.txt \
          --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
          -o "${SAFE_TITLE}.mp4"
        
        # Get file size in bytes
        FILE_SIZE=$(stat -c%s "${SAFE_TITLE}.mp4")
        echo "file_size=${FILE_SIZE}" >> $GITHUB_OUTPUT
        
        # 40 MB = 41943040 bytes
        MAX_SIZE=41943040
        
        if [ $FILE_SIZE -gt $MAX_SIZE ]; then
          echo "needs_split=true" >> $GITHUB_OUTPUT
          
          # Calculate number of parts needed (ceiling division)
          PART_COUNT=$(( (FILE_SIZE + MAX_SIZE - 1) / MAX_SIZE ))
          echo "part_count=${PART_COUNT}" >> $GITHUB_OUTPUT
          
          # Split into 40MB parts and zip each part
          for i in $(seq 1 $PART_COUNT); do
            START=$(( ($i - 1) * MAX_SIZE ))
            # Extract each chunk using dd
            dd if="${SAFE_TITLE}.mp4" of="part${i}.mp4" bs=1 skip=$START count=$MAX_SIZE 2>/dev/null
            # Zip the chunk to ensure it's under 50MB (Apps Script limit)
            zip "part${i}.zip" "part${i}.mp4"
            # Remove the raw part file
            rm "part${i}.mp4"
            echo "Created part${i}.zip"
          done
          
          # Remove original file
          rm "${SAFE_TITLE}.mp4"
        else
          echo "needs_split=false" >> $GITHUB_OUTPUT
        fi

    - name: List files for debugging
      run: ls -la

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        name: "Video: ${{ steps.title.outputs.raw_title }}"
        tag_name: "req-${{ steps.title.outputs.request_id }}-run-${{ github.run_id }}"
        files: |
          *.mp4
          *.zip
        generate_release_notes: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
