name: YouTube Downloader API

on:
  repository_dispatch:
    types: [download]
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube URL'
        required: true
        default: 'https://www.youtube.com/watch?v=dQw4w9WgXcQ'

jobs:
  download:
    runs-on: ubuntu-latest
    outputs:
      download-url: ${{ steps.upload.outputs.url }}
    
    steps:
    - name: Setup yt-dlp
      uses: AnimMouse/setup-yt-dlp@v3
    
    - name: Download video
      run: |
        yt-dlp "${{ github.event.client_payload.url || github.event.inputs.url }}" -f "best[height<=720]" --merge-output-format mp4 -o "video.mp4"
    
    - name: Upload artifact
      id: upload
      uses: actions/upload-artifact@v4
      with:
        name: video
        path: video.mp4
        retention-days: 1
