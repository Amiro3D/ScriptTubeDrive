name: YouTube Downloader API

on:
  repository_dispatch:
    types: [download]
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube URL'
        required: true

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup yt-dlp
      uses: AnimMouse/setup-yt-dlp@v3

    - name: Check cookies
      run: |
        if [ ! -f cookies.txt ]; then
          echo "cookies.txt not found! Please add it to the repository."
          exit 1
        fi

    - name: Get video title and sanitize it
      id: title
      run: |
        URL="${{ github.event.client_payload.url || github.event.inputs.url }}"
        RAW_TITLE=$(yt-dlp --get-title "$URL" --cookies cookies.txt 2>/dev/null || echo "YouTube_Video")
        SAFE_TITLE=$(echo "$RAW_TITLE" | sed 's/[^a-zA-Z0-9\-]/_/g' | sed 's/__*/_/g' | sed 's/^_//' | sed 's/_$//' | cut -c1-100)
        if [ -z "$SAFE_TITLE" ]; then
          SAFE_TITLE="video_$(date +%Y%m%d_%H%M%S)"
        fi
        echo "raw_title=${RAW_TITLE}" >> $GITHUB_OUTPUT
        echo "safe_title=${SAFE_TITLE}" >> $GITHUB_OUTPUT
        echo "request_id=${{ github.event.client_payload.request_id }}" >> $GITHUB_OUTPUT

    - name: Download video with unique timestamp to avoid conflicts
      id: download
      run: |
        URL="${{ github.event.client_payload.url || github.event.inputs.url }}"
        SAFE_TITLE="${{ steps.title.outputs.safe_title }}"
        TIMESTAMP=$(date +%Y%m%d_%H%M%S)
        FINAL_NAME="${SAFE_TITLE}_${TIMESTAMP}.mp4"
        yt-dlp -f "best[height<=720]" --merge-output-format mp4 --cookies cookies.txt \
          --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
          -o "$FINAL_NAME" "$URL"
        echo "video_file=${FINAL_NAME}" >> $GITHUB_OUTPUT

    - name: Upload to Google Drive using OAuth
      uses: adityak74/google-drive-upload-git-action@main
      id: upload
      with:
        credentials: '{"installed":{"client_id":"${{ secrets.GDRIVE_CLIENT_ID }}","client_secret":"${{ secrets.GDRIVE_CLIENT_SECRET }}"}}'
        refreshToken: ${{ secrets.GDRIVE_REFRESH_TOKEN }}
        filename: ${{ steps.download.outputs.video_file }}
        folderId: ${{ secrets.FOLDER_ID }}
        overwrite: false

    - name: Get File ID from action output (action prints it)
      id: get_link
      run: |
        # The action does not output a variable directly, but it prints the file ID in its logs.
        # We'll extract it using a regex on the logs (a bit hacky but reliable).
        # As an alternative, we can use a Python script to list the folder (using the same OAuth credentials) – simpler.
        pip install google-api-python-client google-auth-oauthlib
        python << 'EOF'
        import os
        from google.oauth2.credentials import Credentials
        from google.auth.transport.requests import Request
        from googleapiclient.discovery import build

        client_id = "${{ secrets.GDRIVE_CLIENT_ID }}"
        client_secret = "${{ secrets.GDRIVE_CLIENT_SECRET }}"
        refresh_token = "${{ secrets.GDRIVE_REFRESH_TOKEN }}"
        folder_id = "${{ secrets.FOLDER_ID }}"
        filename = "${{ steps.download.outputs.video_file }}"

        creds = Credentials(
            None,
            refresh_token=refresh_token,
            token_uri="https://oauth2.googleapis.com/token",
            client_id=client_id,
            client_secret=client_secret,
            scopes=["https://www.googleapis.com/auth/drive.file"]
        )
        creds.refresh(Request())
        service = build("drive", "v3", credentials=creds)

        # Search for the file in the folder
        query = f"name='{filename}' and '{folder_id}' in parents and trashed=false"
        results = service.files().list(q=query, fields="files(id, name)").execute()
        files = results.get("files", [])
        if files:
            file_id = files[0]["id"]
            link = f"https://drive.google.com/file/d/{file_id}/view"
            print(f"Drive link: {link}")
            # Write to GitHub output
            with open(os.environ["GITHUB_OUTPUT"], "a") as out:
                out.write(f"drive_url={link}\n")
        else:
            print("File not found after upload")
            exit(1)
        EOF

    - name: Create Release with Drive link
      uses: softprops/action-gh-release@v1
      with:
        name: "Video: ${{ steps.title.outputs.raw_title }}"
        tag_name: "req-${{ steps.title.outputs.request_id }}-run-${{ github.run_id }}"
        body: |
          Drive file URL: ${{ steps.get_link.outputs.drive_url }}
          File name: ${{ steps.download.outputs.video_file }}
        generate_release_notes: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
