name: YouTube Downloader API

on:
  repository_dispatch:
    types: [download]
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube URL'
        required: true

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup yt-dlp
      uses: AnimMouse/setup-yt-dlp@v3

    - name: Check cookies file
      run: |
        if [ -f cookies.txt ]; then echo "cookies.txt found"; else echo "cookies.txt not found!"; exit 1; fi

    - name: Get video title and sanitize it
      id: title
      run: |
        URL="${{ github.event.client_payload.url || github.event.inputs.url }}"
        RAW_TITLE=$(yt-dlp --get-title "$URL" --cookies cookies.txt 2>/dev/null || echo "YouTube_Video")
        SAFE_TITLE=$(echo "$RAW_TITLE" | sed 's/[^a-zA-Z0-9\-]/_/g' | sed 's/__*/_/g' | sed 's/^_//' | sed 's/_$//' | cut -c1-100)
        [ -z "$SAFE_TITLE" ] && SAFE_TITLE="video_$(date +%Y%m%d_%H%M%S)"
        echo "raw_title=${RAW_TITLE}" >> $GITHUB_OUTPUT
        echo "safe_title=${SAFE_TITLE}" >> $GITHUB_OUTPUT
        echo "request_id=${{ github.event.client_payload.request_id }}" >> $GITHUB_OUTPUT

    - name: Download video
      id: download
      run: |
        URL="${{ github.event.client_payload.url || github.event.inputs.url }}"
        SAFE_TITLE="${{ steps.title.outputs.safe_title }}"
        yt-dlp -f "best[height<=720]" --merge-output-format mp4 --cookies cookies.txt \
          --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
          -o "${SAFE_TITLE}.mp4" "$URL"
        echo "video_file=${SAFE_TITLE}.mp4" >> $GITHUB_OUTPUT

    - name: Encode service account JSON to base64
      id: encode
      run: |
        echo "SERVICE_ACCOUNT_BASE64=$(echo '${{ secrets.GDRIVE_CREDENTIALS }}' | base64 -w 0)" >> $GITHUB_OUTPUT

    - name: Upload to Google Drive
      id: upload
      uses: samuelint/google-drive-upload@v1.1.3
      with:
        folder_id: ${{ secrets.FOLDER_ID }}
        service_account: ${{ steps.encode.outputs.SERVICE_ACCOUNT_BASE64 }}
        source_path: ${{ steps.download.outputs.video_file }}
        upload_cutoff: 10G

    - name: Create Release with Drive link
      uses: softprops/action-gh-release@v1
      with:
        name: "Video: ${{ steps.title.outputs.raw_title }}"
        tag_name: "req-${{ steps.title.outputs.request_id }}-run-${{ github.run_id }}"
        body: |
          Drive file URL: ${{ steps.upload.outputs.file_url }}
          File name: ${{ steps.download.outputs.video_file }}
        generate_release_notes: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
