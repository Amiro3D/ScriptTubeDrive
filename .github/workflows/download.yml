name: YouTube Downloader API

on:
  repository_dispatch:
    types: [download]
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube URL'
        required: true

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup yt-dlp
      uses: AnimMouse/setup-yt-dlp@v3

    - name: Check cookies
      run: |
        if [ ! -f cookies.txt ]; then
          echo "cookies.txt not found! Please add it to the repository."
          exit 1
        fi

    - name: Get video title and sanitize it
      id: title
      run: |
        URL="${{ github.event.client_payload.url || github.event.inputs.url }}"
        RAW_TITLE=$(yt-dlp --get-title "$URL" --cookies cookies.txt 2>/dev/null || echo "YouTube_Video")
        SAFE_TITLE=$(echo "$RAW_TITLE" | sed 's/[^a-zA-Z0-9\-]/_/g' | sed 's/__*/_/g' | sed 's/^_//' | sed 's/_$//' | cut -c1-100)
        if [ -z "$SAFE_TITLE" ]; then
          SAFE_TITLE="video_$(date +%Y%m%d_%H%M%S)"
        fi
        echo "raw_title=${RAW_TITLE}" >> $GITHUB_OUTPUT
        echo "safe_title=${SAFE_TITLE}" >> $GITHUB_OUTPUT
        echo "request_id=${{ github.event.client_payload.request_id }}" >> $GITHUB_OUTPUT

    - name: Download video
      id: download
      run: |
        URL="${{ github.event.client_payload.url || github.event.inputs.url }}"
        SAFE_TITLE="${{ steps.title.outputs.safe_title }}"
        yt-dlp -f "best[height<=720]" --merge-output-format mp4 --cookies cookies.txt \
          --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
          -o "${SAFE_TITLE}.mp4" "$URL"
        echo "video_file=${SAFE_TITLE}.mp4" >> $GITHUB_OUTPUT

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Google API client
      run: pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib

    - name: Upload to Google Drive using Python (hardcoded tokens)
      id: upload
      run: |
        python << 'EOF'
        import os
        from google.oauth2.credentials import Credentials
        from google.auth.transport.requests import Request
        from googleapiclient.discovery import build
        from googleapiclient.http import MediaFileUpload

        filename = "${{ steps.download.outputs.video_file }}"
        folder_id = "1BL1p3Q-6OL50GzVbC0K_n7XwF7gAuU3Z"
        client_id = "298932516202-s04jq03rqnosl8b6andvjvegqtj53ofp.apps.googleusercontent.com"
        client_secret = "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"
        refresh_token = "1//04B0eBqlRgMLfCgYIARAAGAQSNwF-L9IrmQwX35CbceqN7KSqF1FlHhEeECHyHN8nnfhJHd6-42__K84Mg_FWK-OpwbHBBAZ_faQ"

        # Build credentials
        creds = Credentials(
            None,
            refresh_token=refresh_token,
            token_uri='https://oauth2.googleapis.com/token',
            client_id=client_id,
            client_secret=client_secret,
            scopes=['https://www.googleapis.com/auth/drive.file']
        )
        # Refresh to get an access token
        creds.refresh(Request())
        
        service = build('drive', 'v3', credentials=creds)
        
        # Upload file
        media = MediaFileUpload(filename, mimetype='video/mp4', resumable=True)
        file_metadata = {'name': os.path.basename(filename), 'parents': [folder_id]}
        file = service.files().create(body=file_metadata, media_body=media, fields='id').execute()
        file_id = file.get('id')
        
        # Make it publicly readable (so anyone can view)
        service.permissions().create(fileId=file_id, body={'type': 'anyone', 'role': 'reader'}).execute()
        
        link = f"https://drive.google.com/file/d/{file_id}/view"
        print(f"Drive link: {link}")
        # Write output for GitHub Actions
        with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
            out.write(f"drive_url={link}\n")
        EOF

    - name: Create Release with Drive link
      uses: softprops/action-gh-release@v1
      with:
        name: "Video: ${{ steps.title.outputs.raw_title }}"
        tag_name: "req-${{ steps.title.outputs.request_id }}-run-${{ github.run_id }}"
        body: |
          Drive file URL: ${{ steps.upload.outputs.drive_url }}
          File name: ${{ steps.download.outputs.video_file }}
        generate_release_notes: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
