name: YouTube Downloader API

on:
  repository_dispatch:
    types: [download]
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube URL'
        required: true
        default: 'https://www.youtube.com/watch?v=dQw4w9WgXcQ'
      quality:
        description: 'Quality'
        required: false
        default: '720'
        type: choice
        options:
          - '144'
          - '240'
          - '360'
          - '480'
          - '720'
          - '1080'
          - 'best'
          - 'audio'

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # ۱. تولید کلید اختصاصی هفتگی برای آپدیت نگه داشتن کش پکیج‌ها
    - name: Get current week number
      id: get-date
      run: echo "week=$(date +'%Y-%U')" >> $GITHUB_OUTPUT

    # ۲. سیستم کش برای بالا بردن سرعت نصب ابزارها تا حد ثانیه
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ steps.get-date.outputs.week }}
        restore-keys: |
          ${{ runner.os }}-pip-

    # ۳. راه‌اندازی فوق‌العاده سریع ابزار میکس با استفاده از باینری‌های پیش‌ساخته + Retry on failure
    - name: Setup FFmpeg (with retry)
      uses: nick-fields/retry@v3
      with:
        max_attempts: 5
        timeout_seconds: 60
        retry_wait_seconds: 5
        command: |
          echo "Attempting to install FFmpeg..."
          # استفاده از اکشن اصلی
          # ما نمیتوانیم اکشن را داخل retry قرار دهیم، بنابراین دستورات معادل را اجرا می‌کنیم
          # این دستورات همان کاری را انجام می‌دهند که اکشن federicocarboni/setup-ffmpeg انجام می‌دهد
          FFMPEG_VERSION="release"
          if [ "$FFMPEG_VERSION" = "release" ]; then
            LATEST_URL=$(curl -s https://api.github.com/repos/johnvansickle/ffmpeg/releases/latest | grep -Eo 'https://github.com/johnvansickle/ffmpeg/releases/download/[^"]+/ffmpeg-release-amd64-static.tar.xz' | head -1)
            if [ -z "$LATEST_URL" ]; then
              echo "Failed to get latest release URL"
              exit 1
            fi
            wget -O ffmpeg.tar.xz "$LATEST_URL"
          else
            wget -O ffmpeg.tar.xz "https://johnvansickle.com/ffmpeg/releases/ffmpeg-${FFMPEG_VERSION}-amd64-static.tar.xz"
          fi
          tar -xf ffmpeg.tar.xz
          FFMPEG_DIR=$(tar -tf ffmpeg.tar.xz | head -1 | cut -d/ -f1)
          sudo cp ${FFMPEG_DIR}/ffmpeg ${FFMPEG_DIR}/ffprobe /usr/local/bin/
          rm -rf ffmpeg.tar.xz $FFMPEG_DIR
          ffmpeg -version | head -1
          echo "FFmpeg installed successfully"

    # ۴. نصب برق‌آسای ابزارهای دانلود مستقیماً از روی کش
    - name: Install yt-dlp and EJS challenge solver
      run: |
        pip install yt-dlp yt-dlp-ejs

    # ۵. تنظیم کانفیگ موتور جاوااسکریپت برای چالش‌های یوتیوب
    - name: Configure JS Runtime for YouTube Challenge
      run: |
        mkdir -p ~/.config/yt-dlp
        echo "--js-runtimes node" > ~/.config/yt-dlp/config

    - name: Get video title and sanitize it
      id: title
      run: |
        URL="${{ github.event.client_payload.url || github.event.inputs.url }}"
        
        RAW_TITLE=$(yt-dlp --get-title "$URL" --cookies cookies.txt 2>/dev/null || echo "YouTube_Video")
        SAFE_TITLE=$(echo "$RAW_TITLE" | sed 's/[^a-zA-Z0-9\-]/_/g' | sed 's/__*/_/g' | sed 's/^_//' | sed 's/_$//' | cut -c1-100)
        
        if [ -z "$SAFE_TITLE" ]; then
          SAFE_TITLE="video_$(date +%Y%m%d_%H%M%S)"
        fi
        
        echo "raw_title=${RAW_TITLE}" >> $GITHUB_OUTPUT
        echo "safe_title=${SAFE_TITLE}" >> $GITHUB_OUTPUT
        echo "request_id=${{ github.event.client_payload.request_id }}" >> $GITHUB_OUTPUT

    - name: Download video and handle Zip/Split logic
      id: download
      run: |
        URL="${{ github.event.client_payload.url || github.event.inputs.url }}"
        QUALITY="${{ github.event.client_payload.quality || github.event.inputs.quality || '720' }}"
        SAFE_TITLE="${{ steps.title.outputs.safe_title }}"
        
        # مپ کردن کیفیت انتخاب شده
        case "$QUALITY" in
          "144")  YTDLP_F="-f bestvideo[height<=144]+bestaudio/best[height<=144]" ;;
          "240")  YTDLP_F="-f bestvideo[height<=240]+bestaudio/best[height<=240]" ;;
          "360")  YTDLP_F="-f bestvideo[height<=360]+bestaudio/best[height<=360]" ;;
          "480")  YTDLP_F="-f bestvideo[height<=480]+bestaudio/best[height<=480]" ;;
          "720")  YTDLP_F="-f bestvideo[height<=720]+bestaudio/best[height<=720]" ;;
          "1080") YTDLP_F="-f bestvideo[height<=1080]+bestaudio/best[height<=1080]" ;;
          "best") YTDLP_F="--merge-output-format mp4" ;;
          "audio") YTDLP_F="-x --audio-format mp3" ;;
          *)      YTDLP_F="-f bestvideo[height<=720]+bestaudio/best[height<=720]" ;;
        esac
        
        # اجرای عملیات دانلود
        yt-dlp $YTDLP_F \
          --merge-output-format mp4 \
          --cookies cookies.txt \
          --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
          -o "${SAFE_TITLE}.%(ext)s" "$URL"
        
        if [ "$QUALITY" = "audio" ]; then
          EXT="mp3"
        else
          EXT="mp4"
        fi
        FINAL_NAME="${SAFE_TITLE}.${EXT}"
        
        if [ -f "$FINAL_NAME" ]; then
          REAL_FILE="$FINAL_NAME"
        else
          FOUND=$(ls *.${EXT} 2>/dev/null | head -1)
          if [ -n "$FOUND" ]; then
            REAL_FILE="$FOUND"
          else
            echo "ERROR: No output file found"
            exit 1
          fi
        fi

        # ایجاد پوشه موقت آرتیفکت‌ها برای فرآیند آپلود ریلیز
        mkdir -p upload_artifacts

        # سنجش حجم فایل برای تصمیم‌گیری فرآیند زیپ و تقسیم (محدودیت ۴۵ مگابایت)
        FILE_SIZE=$(stat -c%s "$REAL_FILE")
        MAX_SIZE=$((45 * 1024 * 1024))

        if [ "$FILE_SIZE" -gt "$MAX_SIZE" ]; then
          echo "File size ($FILE_SIZE bytes) exceeds 45MB. Creating split zip archive..."
          # زیپ و پارت‌بندی همزمان و نیتیو به تکه‌های ۴۵ مگابایتی
          zip -s 45m "upload_artifacts/${SAFE_TITLE}.zip" "$REAL_FILE"
        else
          echo "File size ($FILE_SIZE bytes) is within 45MB. Copying file directly..."
          cp "$REAL_FILE" "upload_artifacts/"
        fi

    - name: List files for debugging
      run: ls -la upload_artifacts/

    - name: Create Release with Run ID and Request ID
      uses: softprops/action-gh-release@v1
      with:
        name: "Video: ${{ steps.title.outputs.raw_title }}"
        tag_name: "req-${{ steps.title.outputs.request_id }}-run-${{ github.run_id }}"
        files: "upload_artifacts/*"
        generate_release_notes: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
