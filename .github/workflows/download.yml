name: YouTube to Google Drive

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup yt-dlp
      uses: AnimMouse/setup-yt-dlp@v3
    
    - name: Create video links
      run: |
        cat > links.txt << 'EOF'
        https://www.youtube.com/watch?v=dQw4w9WgXcQ
        EOF
    
    - name: Download videos
      run: |
        yt-dlp --batch-file links.txt -f "best[height<=720]" --merge-output-format mp4 -o "%(title)s.%(ext)s"
    
    - name: Upload to Google Drive
      uses: Jumbo810/Upload_Github_Artifacts_TO_GDrive@v2.3.3
      with:
        target: "*.mp4"
        credentials: ${{ secrets.GDRIVE_CREDENTIALS }}
        parent_folder_id: ${{ secrets.FOLDER_ID }}
        override: true
