name: YouTube Downloader API

on:
  repository_dispatch:
    types: [download]
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube URL'
        required: true
        default: 'https://www.youtube.com/watch?v=dQw4w9WgXcQ'

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup yt-dlp
      uses: AnimMouse/setup-yt-dlp@v3
    
    - name: Get video title
      id: title
      run: |
        TITLE=$(yt-dlp --get-title "${{ github.event.client_payload.url || github.event.inputs.url }}" --cookies cookies.txt 2>/dev/null || echo "video")
        echo "name=${TITLE}" >> $GITHUB_OUTPUT
    
    - name: Download video with title
      run: |
        SAFE_TITLE=$(echo "${{ steps.title.outputs.name }}" | sed 's/[^a-zA-Z0-9]/_/g')
        yt-dlp "${{ github.event.client_payload.url || github.event.inputs.url }}" \
          -f "best[height<=720]" \
          --merge-output-format mp4 \
          --cookies cookies.txt \
          --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
          -o "${SAFE_TITLE}.mp4"
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: video
        path: "*.mp4"
        retention-days: 1
