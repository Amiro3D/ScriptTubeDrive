name: YouTube Downloader API

on:
  repository_dispatch:
    types: [download]
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube URL'
        required: true
        default: 'https://www.youtube.com/watch?v=dQw4w9WgXcQ'

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to create releases

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup yt-dlp
      uses: AnimMouse/setup-yt-dlp@v3

    - name: Download video
      run: |
        URL="${{ github.event.client_payload.url || github.event.inputs.url }}"
        
        # The fix: forcing the 'ios' client bypasses the PO token requirement
        yt-dlp "$URL" \
          -f "best[height<=720]" \
          --merge-output-format mp4 \
          --cookies cookies.txt \
          --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
          --extractor-args "youtube:player_client=android,android_embedded"
          -o "video.mp4"

    - name: Get video title
      id: title
      run: |
        TITLE=$(yt-dlp --get-title "${{ github.event.client_payload.url || github.event.inputs.url }}" --cookies cookies.txt 2>/dev/null || echo "YouTube Video")
        # Sanitize title for filename
        SAFE_TITLE=$(echo "$TITLE" | sed 's/[^a-zA-Z0-9]/_/g' | cut -c1-100)
        echo "name=${SAFE_TITLE}" >> $GITHUB_OUTPUT
        echo "raw=${TITLE}" >> $GITHUB_OUTPUT

    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        name: "Video: ${{ steps.title.outputs.raw }}"
        tag_name: "video-${{ github.run_id }}"
        files: video.mp4
        generate_release_notes: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
