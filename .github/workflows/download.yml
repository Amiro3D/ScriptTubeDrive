name: YouTube Downloader API

on:
  repository_dispatch:
    types: [download]
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube URL'
        required: true
        default: 'https://www.youtube.com/watch?v=dQw4w9WgXcQ'
      quality:
        description: 'Quality'
        required: false
        default: '720'
        type: choice
        options:
          - '144'
          - '240'
          - '360'
          - '480'
          - '720'
          - '1080'
          - 'best'
          - 'audio'

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup yt-dlp
      uses: AnimMouse/setup-yt-dlp@v3

    - name: Get video title and sanitize it
      id: title
      run: |
        URL="${{ github.event.client_payload.url || github.event.inputs.url }}"
        
        RAW_TITLE=$(yt-dlp --get-title "$URL" --cookies cookies.txt 2>/dev/null || echo "YouTube_Video")
        SAFE_TITLE=$(echo "$RAW_TITLE" | sed 's/[^a-zA-Z0-9\-]/_/g' | sed 's/__*/_/g' | sed 's/^_//' | sed 's/_$//' | cut -c1-100)
        
        if [ -z "$SAFE_TITLE" ]; then
          SAFE_TITLE="video_$(date +%Y%m%d_%H%M%S)"
        fi
        
        echo "raw_title=${RAW_TITLE}" >> $GITHUB_OUTPUT
        echo "safe_title=${SAFE_TITLE}" >> $GITHUB_OUTPUT
        echo "request_id=${{ github.event.client_payload.request_id }}" >> $GITHUB_OUTPUT

    - name: Download video with quality selection
      id: download
      run: |
        URL="${{ github.event.client_payload.url || github.event.inputs.url }}"
        QUALITY="${{ github.event.client_payload.quality || github.event.inputs.quality || '720' }}"
        SAFE_TITLE="${{ steps.title.outputs.safe_title }}"
        
        # Map quality to yt-dlp format selector
        case "$QUALITY" in
          "144")  YTDLP_F="-f bestvideo[height<=144]+bestaudio/best[height<=144]" ;;
          "240")  YTDLP_F="-f bestvideo[height<=240]+bestaudio/best[height<=240]" ;;
          "360")  YTDLP_F="-f bestvideo[height<=360]+bestaudio/best[height<=360]" ;;
          "480")  YTDLP_F="-f bestvideo[height<=480]+bestaudio/best[height<=480]" ;;
          "720")  YTDLP_F="-f bestvideo[height<=720]+bestaudio/best[height<=720]" ;;
          "1080") YTDLP_F="-f bestvideo[height<=1080]+bestaudio/best[height<=1080]" ;;
          "best") YTDLP_F="--merge-output-format mp4" ;;
          "audio") YTDLP_F="-x --audio-format mp3" ;;
          *)      YTDLP_F="-f bestvideo[height<=720]+bestaudio/best[height<=720]" ;;
        esac
        
        yt-dlp $YTDLP_F \
          --merge-output-format mp4 \
          --cookies cookies.txt \
          --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
          -o "${SAFE_TITLE}.%(ext)s" "$URL"
        
        # Determine output file extension
        if [ "$QUALITY" = "audio" ]; then
          EXT="mp3"
        else
          EXT="mp4"
        fi
        FINAL_NAME="${SAFE_TITLE}.${EXT}"
        
        # Check file size and split if > 45 MB (45 * 1024 * 1024 = 47185920 bytes)
        MAX_SIZE=47185920
        if [ -f "$FINAL_NAME" ]; then
          FILE_SIZE=$(stat -c%s "$FINAL_NAME")
          if [ "$FILE_SIZE" -gt "$MAX_SIZE" ]; then
            echo "File size ${FILE_SIZE} > 45MB, splitting into 45MB zip parts"
            # Split into 45MB zip parts (creates part1.zip, part2.zip, ...)
            zip -s 45m "${SAFE_TITLE}.zip" "$FINAL_NAME"
            # Remove the original large file
            rm "$FINAL_NAME"
            # Rename the parts to have consistent naming (optional)
            # The parts are named like: ${SAFE_TITLE}.zip, ${SAFE_TITLE}.z01, ${SAFE_TITLE}.z02, ...
            ls -la "${SAFE_TITLE}".z* "${SAFE_TITLE}".zip 2>/dev/null
            # We will upload all these parts. Set output variable to a marker.
            echo "split=true" >> $GITHUB_OUTPUT
            # We'll list the parts dynamically in the release step
          else
            echo "File size within limit (${FILE_SIZE} bytes), no split"
            echo "split=false" >> $GITHUB_OUTPUT
          fi
        else
          echo "ERROR: Output file not found"
          exit 1
        fi

    - name: Create Release with all assets (single file or split parts)
      uses: softprops/action-gh-release@v1
      with:
        name: "Video: ${{ steps.title.outputs.raw_title }}"
        tag_name: "req-${{ steps.title.outputs.request_id }}-run-${{ github.run_id }}"
        files: |
          *.mp4
          *.mp3
          *.zip
          *.z*
        generate_release_notes: false
        body: |
          Split: ${{ steps.download.outputs.split }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
