name: TikTok Downloader

on:
  repository_dispatch:
    types: [direct_download_tiktok]
  workflow_dispatch:
    inputs:
      url:
        description: 'TikTok URL'
        required: true

jobs:
  download-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - name: Setup & download
      id: dl
      env:
        BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
      run: |
        set -e
        WORKER_URL="https://bitter-wind-2755.ame315898036.workers.dev/progress"
        report() {
          if [ -n "$CHAT_ID" ] && [ -n "$PROGRESS_MSG_ID" ]; then
            curl -s -X POST "$WORKER_URL" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\":\"$CHAT_ID\",\"message_id\":\"$PROGRESS_MSG_ID\",\"progress\":\"$1\",\"status\":\"$2\",\"file_size\":\"${3:-}\",\"quality\":\"${4:-}\"}" > /dev/null 2>&1 || true
          fi
        }

        # --- Resolve inputs ---
        URL="${{ github.event.client_payload.url || inputs.url }}"
        CHAT_ID="${{ github.event.client_payload.chat_id || '102332059' }}"
        PROGRESS_MSG_ID="${{ github.event.client_payload.progress_msg_id || '' }}"
        GROUP_CHAT_ID="${{ github.event.client_payload.group_chat_id || '' }}"

        # --- Download tools tarball ---
        curl -sL "https://github.com/${{ github.repository }}/releases/download/tools-v1/tools.tar.gz" | sudo tar xz -C /usr/local/bin &

        # --- Start Telegram Bot API in background ---
        docker run -d --name telegram-bot-api -p 8081:8081 \
          -e TELEGRAM_API_ID=32919068 \
          -e TELEGRAM_API_HASH="$TELEGRAM_API_HASH" \
          -e TELEGRAM_BOT_TOKEN="$BOT_TOKEN" \
          aiogram/telegram-bot-api:latest &
        wait

        # --- Poll Docker (0.5s intervals) ---
        for i in $(seq 1 40); do
          curl -s http://localhost:8081/ping > /dev/null 2>&1 && break
          sleep 0.5
        done
        curl -s http://localhost:8081/ping > /dev/null 2>&1 || { echo "ERROR: Bot API failed"; docker logs telegram-bot-api; exit 1; }

        report 10 "downloading"

        # --- Download TikTok video ---
        mkdir -p /tmp/tt && cd /tmp/tt
        yt-dlp \
          --write-thumbnail --convert-thumbnails jpg \
          -o "video.%(ext)s" \
          --no-overwrites --ignore-errors \
          --js-runtimes deno \
          "$URL" 2>&1 || true

        # --- Find video ---
        VIDEO=""
        for f in *.mp4 *.webm *.mkv; do [ -f "$f" ] && VIDEO="$f" && break; done
        if [ -z "$VIDEO" ]; then
          for f in *; do
            EXT="${f##*.}"
            if [ "$EXT" != "jpg" ] && [ "$EXT" != "png" ] && [ -f "$f" ]; then
              VIDEO="$f"
              break
            fi
          done
        fi

        [ -z "$VIDEO" ] && { echo "ERROR: No video found"; report 0 "error"; exit 1; }

        report 90 "uploading"

        # --- Send to Telegram ---
        API_URL="http://localhost:8081/bot${BOT_TOKEN}"
        TOTAL_SIZE=$(du -sh "$VIDEO" 2>/dev/null | cut -f1 | sed 's/M$/MB/' | sed 's/G$/GB/')

        for i in 1 2 3 4 5; do
          RESP=$(curl -s -X POST "${API_URL}/sendVideo" \
            -F chat_id="$CHAT_ID" -F video=@"$VIDEO" -F supports_streaming=true)
          MSG_ID=$(echo "$RESP" | grep -o '"message_id":[0-9]*' | head -1 | cut -d: -f2)
          if [ -n "$MSG_ID" ] && [ "$MSG_ID" != "0" ]; then break; fi
          ERROR_CODE=$(echo "$RESP" | grep -o '"error_code":[0-9]*' | head -1 | cut -d: -f2)
          if [ "$ERROR_CODE" = "429" ]; then
            RETRY_AFTER=$(echo "$RESP" | grep -o '"retry_after":[0-9]*' | head -1 | cut -d: -f2)
            sleep $((RETRY_AFTER + 2))
          else
            echo "ERROR: $RESP"
            report 0 "error"
            exit 1
          fi
        done

        [ -z "$MSG_ID" ] || [ "$MSG_ID" = "null" ] || [ "$MSG_ID" = "0" ] && { report 0 "error"; exit 1; }

        report 100 "done" "$TOTAL_SIZE" "TikTok"

        if [ -n "$GROUP_CHAT_ID" ] && [ "$GROUP_CHAT_ID" != "null" ]; then
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/forwardMessage" \
            -d chat_id="$GROUP_CHAT_ID" -d from_chat_id="$CHAT_ID" -d message_id="$PROGRESS_MSG_ID" &
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/forwardMessage" \
            -d chat_id="$GROUP_CHAT_ID" -d from_chat_id="$CHAT_ID" -d message_id="$MSG_ID" &
        fi

        echo "Done! Message ID: $MSG_ID"
